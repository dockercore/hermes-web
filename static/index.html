<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Voice Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #232334;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00b894;
    --red: #e17055;
    --text: #dfe6e9;
    --text2: #b2bec3;
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid rgba(108,92,231,0.2);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .status {
    margin-left: auto;
    font-size: 13px;
    color: var(--text2);
    display: flex; align-items: center; gap: 6px;
  }
  .header .status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
  }
  .header .status .dot.off { background: var(--red); }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 15px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--accent), #7c6cf0);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--surface2);
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    padding: 8px;
  }
  .msg.thinking {
    align-self: flex-start;
    background: rgba(108,92,231,0.1);
    border: 1px dashed rgba(108,92,231,0.3);
    color: var(--text2);
    font-size: 13px;
    border-bottom-left-radius: 4px;
  }
  .msg .typing-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text2);
    margin: 0 2px;
    animation: bounce 1.4s infinite;
  }
  .msg .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .msg .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* Bottom bar */
  .bottom-bar {
    padding: 16px 20px 24px;
    background: var(--surface);
    border-top: 1px solid rgba(108,92,231,0.15);
    flex-shrink: 0;
  }

  /* Voice button */
  .voice-btn-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .voice-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .voice-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(108,92,231,0.4); }
  .voice-btn.recording {
    background: linear-gradient(135deg, var(--red), #ff7675);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(225,112,85,0.5); }
    50% { box-shadow: 0 0 0 20px rgba(225,112,85,0); }
  }
  .voice-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Secondary buttons */
  .side-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(108,92,231,0.3);
    background: transparent;
    color: var(--text2);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .side-btn:hover { background: var(--surface2); color: var(--text); }

  /* Text input fallback */
  .text-input-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .text-input-row input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 24px;
    border: 1px solid rgba(108,92,231,0.3);
    background: var(--surface2);
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
  }
  .text-input-row input:focus { border-color: var(--accent); }
  .text-input-row input::placeholder { color: var(--text2); }
  .text-input-row button {
    padding: 12px 20px;
    border-radius: 24px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .text-input-row button:hover { opacity: 0.85; }

  /* Transcript hint */
  .transcript {
    text-align: center;
    color: var(--text2);
    font-size: 13px;
    margin-top: 8px;
    min-height: 20px;
  }

  /* Settings panel */
  .settings-panel {
    display: none;
    position: fixed;
    top: 0; right: 0;
    width: 320px; height: 100vh;
    background: var(--surface);
    border-left: 1px solid rgba(108,92,231,0.2);
    padding: 24px;
    z-index: 100;
    animation: slideIn 0.3s ease;
  }
  .settings-panel.show { display: block; }
  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  .settings-panel h2 { font-size: 18px; margin-bottom: 20px; }
  .setting-item { margin-bottom: 16px; }
  .setting-item label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .setting-item select, .setting-item input[type="range"] {
    width: 100%; padding: 8px; border-radius: 8px;
    background: var(--surface2); color: var(--text);
    border: 1px solid rgba(108,92,231,0.2);
  }
  .setting-item input[type="range"] { padding: 0; accent-color: var(--accent); }
  .close-settings {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .msg { max-width: 90%; }
    .settings-panel { width: 100%; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">🎙</div>
  <h1>Hermes Voice Chat</h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">已连接</span>
  </div>
  <button class="side-btn" onclick="toggleSettings()" title="设置">⚙</button>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="msg system">👋 点击麦克风按钮开始语音对话，或使用下方文字输入</div>
</div>

<!-- Bottom -->
<div class="bottom-bar">
  <div class="voice-btn-wrap">
    <button class="side-btn" onclick="resetChat()" title="重置对话">🔄</button>
    <button class="voice-btn" id="voiceBtn" onclick="toggleRecording()" title="按住说话">
      🎤
    </button>
    <button class="side-btn" onclick="stopSpeaking()" title="停止朗读">🔇</button>
  </div>
  <div class="transcript" id="transcript"></div>
  <div class="text-input-row">
    <input type="text" id="textInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendText()">
    <button onclick="sendText()">发送</button>
  </div>
</div>

<!-- Settings -->
<div class="settings-panel" id="settingsPanel">
  <button class="close-settings" onclick="toggleSettings()">✕</button>
  <h2>设置</h2>
  <div class="setting-item">
    <label>语音识别语言</label>
    <select id="sttLang">
      <option value="zh-CN" selected>中文 (普通话)</option>
      <option value="zh-TW">中文 (繁体)</option>
      <option value="en-US">English (US)</option>
      <option value="ja-JP">日本語</option>
      <option value="ko-KR">한국어</option>
    </select>
  </div>
  <div class="setting-item">
    <label>语音合成声音</label>
    <select id="ttsVoice"></select>
  </div>
  <div class="setting-item">
    <label>语速: <span id="rateVal">1.0</span></label>
    <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1.0"
      oninput="document.getElementById('rateVal').textContent=this.value">
  </div>
  <div class="setting-item">
    <label>音调: <span id="pitchVal">1.0</span></label>
    <input type="range" id="ttsPitch" min="0.5" max="2" step="0.1" value="1.0"
      oninput="document.getElementById('pitchVal').textContent=this.value">
  </div>
  <div class="setting-item">
    <label>自动朗读回复</label>
    <select id="autoSpeak">
      <option value="yes" selected>是</option>
      <option value="no">否</option>
    </select>
  </div>
</div>

<script>
// ==================== 状态管理 ====================
let ws = null;
let isRecording = false;
let isSpeaking = false;
let recognition = null;
let currentUtterance = null;
let reconnectTimer = null;

// ==================== WebSocket ====================
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/chat`);
  
  ws.onopen = () => {
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = '已连接';
  };
  
  ws.onclose = () => {
    document.getElementById('statusDot').className = 'dot off';
    document.getElementById('statusText').textContent = '已断开，重连中...';
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connectWS, 2000);
  };
  
  ws.onerror = () => {
    document.getElementById('statusDot').className = 'dot off';
    document.getElementById('statusText').textContent = '连接错误';
  };
  
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleServerMessage(data);
  };
}

// ==================== 服务端消息处理 ====================
let assistantMsgEl = null;
let thinkingEl = null;
let fullReply = '';
let thinkingText = '';

function handleServerMessage(data) {
  switch(data.type) {
    case 'thinking_start':
      // 显示"正在思考..."
      thinkingEl = addMsg('thinking', '🤔 思考中...');
      break;
    
    case 'thinking':
      // 更新思考内容（折叠显示）
      thinkingText += data.content;
      if (thinkingEl) {
        const preview = thinkingText.length > 60 
          ? thinkingText.substring(0, 60) + '...' 
          : thinkingText;
        thinkingEl.textContent = '🤔 ' + preview;
      }
      scrollToBottom();
      break;
    
    case 'thinking_end':
      // 思考结束，折叠显示
      if (thinkingEl) {
        const preview = thinkingText.length > 80 
          ? thinkingText.substring(0, 80) + '...' 
          : thinkingText;
        thinkingEl.textContent = '🤔 ' + preview;
        thinkingEl.onclick = () => {
          if (thinkingEl.classList.contains('expanded')) {
            thinkingEl.textContent = '🤔 ' + preview;
            thinkingEl.classList.remove('expanded');
          } else {
            thinkingEl.textContent = '🤔 ' + thinkingText;
            thinkingEl.classList.add('expanded');
          }
        };
        thinkingEl.style.cursor = 'pointer';
        thinkingEl.title = '点击展开/折叠思考过程';
      }
      thinkingText = '';
      break;
    
    case 'stream':
      if (!assistantMsgEl) {
        assistantMsgEl = addMsg('assistant', '');
      }
      fullReply += data.content;
      assistantMsgEl.textContent = fullReply;
      scrollToBottom();
      break;
    
    case 'done':
      if (assistantMsgEl) {
        assistantMsgEl.textContent = data.content;
      }
      // 自动朗读
      if (document.getElementById('autoSpeak').value === 'yes') {
        speak(data.content);
      }
      assistantMsgEl = null;
      fullReply = '';
      break;
    
    case 'error':
      addMsg('system', '❌ ' + data.content);
      assistantMsgEl = null;
      fullReply = '';
      break;
    
    case 'reset':
      addMsg('system', '🔄 ' + data.content);
      break;
  }
}

// ==================== UI ====================
function addMsg(role, text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  area.appendChild(div);
  scrollToBottom();
  return div;
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

// ==================== 语音识别 (STT) ====================
function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    console.warn('浏览器不支持语音识别');
    return;
  }
  
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = document.getElementById('sttLang').value;
  
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('voiceBtn').classList.add('recording');
    document.getElementById('voiceBtn').textContent = '⏹';
    document.getElementById('transcript').textContent = '正在聆听...';
  };
  
  recognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        final += t;
      } else {
        interim += t;
      }
    }
    document.getElementById('transcript').textContent = interim || final;
    
    if (final) {
      sendMessage(final);
      document.getElementById('transcript').textContent = '';
    }
  };
  
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('voiceBtn').classList.remove('recording');
    document.getElementById('voiceBtn').textContent = '🎤';
    if (document.getElementById('transcript').textContent === '正在聆听...') {
      document.getElementById('transcript').textContent = '';
    }
  };
  
  recognition.onerror = (e) => {
    console.error('语音识别错误:', e.error);
    isRecording = false;
    document.getElementById('voiceBtn').classList.remove('recording');
    document.getElementById('voiceBtn').textContent = '🎤';
    
    if (e.error === 'not-allowed') {
      document.getElementById('transcript').textContent = '请允许麦克风权限';
    } else if (e.error === 'no-speech') {
      document.getElementById('transcript').textContent = '未检测到语音';
    }
  };
}

function toggleRecording() {
  if (isSpeaking) {
    stopSpeaking();
    return;
  }
  
  if (!recognition) {
    initRecognition();
  }
  
  if (!recognition) {
    document.getElementById('transcript').textContent = '浏览器不支持语音识别，请使用Chrome';
    return;
  }
  
  recognition.lang = document.getElementById('sttLang').value;
  
  if (isRecording) {
    recognition.stop();
  } else {
    recognition.start();
  }
}

// ==================== 语音合成 (TTS) ====================
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  
  // 停止当前播放
  window.speechSynthesis.cancel();
  
  currentUtterance = new SpeechSynthesisUtterance(text);
  const voiceSelect = document.getElementById('ttsVoice');
  const voices = window.speechSynthesis.getVoices();
  
  if (voiceSelect.value && voices.length) {
    const selected = voices.find(v => v.name === voiceSelect.value);
    if (selected) currentUtterance.voice = selected;
  }
  
  currentUtterance.rate = parseFloat(document.getElementById('ttsRate').value);
  currentUtterance.pitch = parseFloat(document.getElementById('ttsPitch').value);
  
  // 自动检测语言
  if (/[\u4e00-\u9fff]/.test(text)) {
    currentUtterance.lang = 'zh-CN';
  } else {
    currentUtterance.lang = 'en-US';
  }
  
  currentUtterance.onstart = () => { isSpeaking = true; };
  currentUtterance.onend = () => { isSpeaking = false; };
  currentUtterance.onerror = () => { isSpeaking = false; };
  
  window.speechSynthesis.speak(currentUtterance);
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  isSpeaking = false;
}

// 加载可用语音列表
function loadVoices() {
  const voices = window.speechSynthesis.getVoices();
  const select = document.getElementById('ttsVoice');
  select.innerHTML = '';
  
  // 优先显示中文语音
  const zhVoices = voices.filter(v => v.lang.startsWith('zh'));
  const otherVoices = voices.filter(v => !v.lang.startsWith('zh'));
  
  const addOption = (v) => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = `${v.name} (${v.lang})`;
    select.appendChild(opt);
  };
  
  zhVoices.forEach(addOption);
  otherVoices.forEach(addOption);
  
  // 默认选择第一个中文语音
  if (zhVoices.length > 0) {
    select.value = zhVoices[0].name;
  }
}

window.speechSynthesis.onvoiceschanged = loadVoices;
// 有些浏览器需要延迟加载
setTimeout(loadVoices, 500);

// ==================== 消息发送 ====================
function sendMessage(text) {
  if (!text.trim()) return;
  addMsg('user', text);
  
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'message', content: text }));
  } else {
    addMsg('system', '⚠️ 未连接到服务器');
  }
}

function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendMessage(text);
}

function resetChat() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'reset' }));
  }
  // 清空聊天区
  const area = document.getElementById('chatArea');
  area.innerHTML = '<div class="msg system">🔄 对话已重置</div>';
  stopSpeaking();
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('show');
}

// ==================== 启动 ====================
connectWS();
initRecognition();
</script>
</body>
</html>
